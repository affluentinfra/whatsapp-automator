<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Template Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body { margin:0; font-family:'Inter',sans-serif; background:#f0f2f5; display:flex; flex-direction:column; align-items:center; }
    #canvas-container { position:relative; margin-top:20px; }
    canvas { border:1px solid #ccc; }
    .toolbar { margin-top:10px; }
    .toolbar button { margin:0 5px; padding:6px 12px; background:#0069d9; color:#fff; border:none; border-radius:4px; cursor:pointer; }
    .toolbar button:hover { background:#0053a6; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js" integrity="sha512-+Q4zGdVY8O5M0a1jZb6p1fG7kO+ZcEJgV3z7V4vR9UeV8XxQy4I2Zz0FZgS5RjW4e9c7kX3P9eXoU6h+v/7LQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/static/js/template_editor.js"></script>
</head>
<body>
  <h1>Template Editor</h1>
  <div id="canvas-container">
    <canvas id="template-canvas" width="800" height="600"></canvas>
  </div>
  <div class="toolbar">
    <button id="add-text">Add Text</button>
    <button id="add-image">Add Image</button>
    <button id="save-template">Save</button>
    <input type="file" id="image-input" accept="image/*" style="display:none;" />
  </div>
</body>
</html>
